name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Release
            cmake_args: ""
            run_tests: true
          - os: macos-latest
            build_type: Release
            cmake_args: ""
            run_tests: true
          - os: windows-latest
            build_type: Release
            cmake_args: "-DSOCKETWIRE_USE_LIBSODIUM=OFF"
            run_tests: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        if: matrix.run_tests
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure
