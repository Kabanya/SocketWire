name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "README.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Deploy docs
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          DOCS_HOST: ${{ secrets.DOCS_HOST }}
          DOCS_USER: ${{ secrets.DOCS_USER }}
          DOCS_PATH: ${{ secrets.DOCS_PATH }}
          DOCS_SSH_KEY: ${{ secrets.DOCS_SSH_KEY }}
          DOCS_PORT: ${{ secrets.DOCS_PORT || 22 }}
        run: |
          for name in DOCS_HOST DOCS_USER DOCS_PATH DOCS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "$name is not set" >&2
              exit 1
            fi
          done

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DOCS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$DOCS_PORT" "$DOCS_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "$DOCS_PORT" "$DOCS_USER@$DOCS_HOST" "mkdir -p '$DOCS_PATH'"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p $DOCS_PORT" site/ "$DOCS_USER@$DOCS_HOST:$DOCS_PATH/"
