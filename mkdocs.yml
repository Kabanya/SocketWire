site_name: SocketWire
site_url: https://socketwire.example.com/
repo_url: https://github.com/Kabanya/SocketWire
repo_name: Kabanya/SocketWire

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Multithreading: multithreading.md
  - Pipeline: pipeline.md
  - Thread Pool: thread-pool.md
  - Project Map: project-map.md

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Architecture: Архитектура
            Multithreading: Многопоточность
            Pipeline: Pipeline
            Thread Pool: Пул потоков
            Project Map: Карта проекта

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
